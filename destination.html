<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>TupTup - miejsce dostawy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app">
        <header class="topbar">
            <button class="icon-button" onclick="location.href='entrance.html'" aria-label="Wróć">‹</button>
            <div class="step-badge">3 z 3</div>
            <a class="cancel" href="#">Anuluj</a>
        </header>

        <section class="hero-copy">
            <h1>Gdzie dostarczyć przesyłkę?</h1>
            <p>Wskaż dokładne miejsce dostawy w budynku.</p>
        </section>

        <section class="map-area" data-map-mode="destination" aria-label="Obrys budynku i przybliżona ścieżka do celu">
            <div class="map-canvas" role="application" aria-label="Mapa OpenStreetMap"></div>
            <div class="map-control-stack">
                <button type="button" class="map-control map-control-locate" aria-label="Moja lokalizacja">⌖</button>
                <button type="button" class="map-control map-control-reset" aria-label="Wyśrodkuj mapę na budynku">2D</button>
            </div>
            <fieldset class="floor-picker">
                <legend class="floor-picker-legend">Piętro</legend>
                <label class="floor-option">
                    <input type="radio" name="floor" value="4">
                    <span>4</span>
                </label>
                <label class="floor-option">
                    <input type="radio" name="floor" value="3">
                    <span>3</span>
                </label>
                <label class="floor-option">
                    <input type="radio" name="floor" value="2" checked>
                    <span>2</span>
                </label>
                <label class="floor-option">
                    <input type="radio" name="floor" value="1">
                    <span>1</span>
                </label>
                <label class="floor-option">
                    <input type="radio" name="floor" value="0">
                    <span>0</span>
                </label>
                <label class="floor-option">
                    <input type="radio" name="floor" value="-1">
                    <span>-1</span>
                </label>
            </fieldset>
        </section>

        <section class="sheet">
            <button type="button" class="sheet-drag-zone" aria-expanded="true" aria-controls="sheet-panel" aria-label="Zwiń lub rozwiń panel">
                <span class="sheet-handle" aria-hidden="true"></span>
            </button>
            <div class="sheet-body" id="sheet-panel">
            <div class="sheet-head">
                <div class="sheet-icon">◎</div>
                <div>
                    <h2>Miejsce dostawy</h2>
                    <p>Sala 229, 2 piętro</p>
                </div>
            </div>
            <div class="form-row">
                <div class="textarea-wrap">
                    <label class="label" for="note-field">Szczegóły opcjonalnie</label>
                    <textarea id="note-field" class="note" maxlength="100" rows="3">Sala 229, po prawej stronie korytarza, za drzwiami szklanymi.</textarea>
                    <div class="counter" aria-live="polite">53/100</div>
                </div>
                <div class="photo-card door" aria-label="Zdjęcie drzwi lub celu dostawy">
                    <button class="camera-button" aria-label="Dodaj zdjęcie">▣</button>
                </div>
            </div>
            <button class="primary-button">Zapisz lokalizację ✓</button>
            </div>
        </section>

        <nav class="bottom-nav" aria-label="Nawigacja">
            <a class="nav-item" href="parking.html"><strong>▰</strong><span>Parking</span></a>
            <a class="nav-item" href="entrance.html"><strong>▯</strong><span>Wejście</span></a>
            <a class="nav-item active" href="destination.html"><strong>◎</strong><span>Cel</span></a>
        </nav>
    </main>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
    <script src="sheet.js" defer></script>
    <script src="camera.js" defer></script>
    <script src="note.js" defer></script>
</body>
</html>

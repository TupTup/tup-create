<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>TupTup - wejście</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app">
        <header class="topbar">
            <button class="icon-button" onclick="location.href='parking.html'" aria-label="Wróć">‹</button>
            <div class="step-badge">2 z 3</div>
            <a class="cancel" href="#">Anuluj</a>
        </header>

        <section class="hero-copy">
            <h1>Którym wejściem wejść?</h1>
            <p>Wskaż właściwe wejście do budynku. Dodaj zdjęcie, aby ułatwić kurierowi.</p>
        </section>

        <section class="map-area" data-map-mode="entrance" aria-label="Mapa z wejściem do budynku">
            <div class="map-canvas" role="application" aria-label="Mapa OpenStreetMap"></div>
            <div class="map-control-stack">
                <button type="button" class="map-control map-control-locate" aria-label="Moja lokalizacja">⌖</button>
                <button type="button" class="map-control map-control-reset" aria-label="Wyśrodkuj mapę na budynku">2D</button>
            </div>
        </section>

        <section class="sheet">
            <button type="button" class="sheet-drag-zone" aria-expanded="true" aria-controls="sheet-panel" aria-label="Zwiń lub rozwiń panel">
                <span class="sheet-handle" aria-hidden="true"></span>
            </button>
            <div class="sheet-body" id="sheet-panel">
            <div class="sheet-head">
                <div class="sheet-icon"><span class="icon-entrance" aria-hidden="true"></span></div>
                <div>
                    <h2>Wybrane wejście</h2>
                    <p>Wejście C10</p>
                </div>
            </div>
            <div class="form-row">
                <div class="textarea-wrap">
                    <label class="label" for="note-field">Opis opcjonalnie</label>
                    <textarea id="note-field" class="note" maxlength="100" rows="3">Wejście C10 znajduje się po lewej stronie od Żabki.</textarea>
                    <div class="counter" aria-live="polite">40/100</div>
                </div>
                <div class="photo-card entrance" aria-label="Zdjęcie wejścia C10">
                    <button class="camera-button" aria-label="Dodaj zdjęcie">▣</button>
                </div>
            </div>
            <button class="primary-button" onclick="location.href='destination.html'">Dalej →</button>
            </div>
        </section>

        <nav class="bottom-nav" aria-label="Nawigacja">
            <a class="nav-item" href="parking.html"><strong><span class="icon-parking" aria-hidden="true">P</span></strong><span>Parking</span></a>
            <a class="nav-item active" href="entrance.html"><strong><span class="icon-entrance" aria-hidden="true"></span></strong><span>Wejście</span></a>
            <a class="nav-item" href="destination.html"><strong>◎</strong><span>Cel</span></a>
        </nav>
    </main>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
    <script src="sheet.js" defer></script>
    <script src="camera.js" defer></script>
    <script src="note.js" defer></script>
</body>
</html>
